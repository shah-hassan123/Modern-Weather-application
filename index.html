<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false" />
            <button><img src="./images/search.png" alt="Search-Button" /></button>
        </div>
        <div class="weather">
            <img class="weather-icon" src="./images/rain.png" alt="Rain-Image" />
            <h1 class="temp">22°c</h1>
            <h2 class="city">New Yourk</h2>
          <div class="details">
    <div class="col">
        <img src="./images/humidity.png" alt="Humidity-img" />
        <div>
            <p class="humidity">50%</p>
            <p>Humidity</p>
        </div>
    </div>

    <div class="col">
        <img src="./images/wind.png" alt="Wind-img" />
        <div>
            <p class="Wind">15 km/h</p>
            <p>Wind Speed</p>
        </div>
    </div>
</div>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
